<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; background:#f0f2f5; }
header { background:#007bff; color:white; padding:20px; text-align:center; font-size:24px; font-weight:bold; }
.container { padding:30px; display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
.card { background:white; padding:20px; border-radius:12px; width:300px; box-shadow:0 8px 20px rgba(0,0,0,0.1); text-align:center; transition:0.3s; }
.card:hover { box-shadow:0 12px 25px rgba(0,0,0,0.2); }
button { padding:10px 20px; margin-top:15px; border:none; border-radius:8px; background:#007bff; color:white; cursor:pointer; font-size:16px; }
button:hover { background:#0056b3; }
input { padding:10px; width:90%; margin:5px 0; border-radius:8px; border:1px solid #ccc; outline:none; }
input:focus { border-color:#007bff; box-shadow:0 0 5px rgba(0,123,255,0.3); }
.section-title { font-weight:bold; margin-bottom:10px; color:#333; }
.message { color:green; margin-top:10px; font-weight:bold; }
.user-list, .file-list { margin-top:10px; text-align:left; max-height:200px; overflow-y:auto; }
.user-item, .file-item { display:flex; justify-content:space-between; padding:5px 10px; border-bottom:1px solid #eee; }
.user-item button { padding:5px 10px; font-size:14px; }
</style>
</head>
<body>

<header>Admin Dashboard</header>

<div class="container">

<div class="card">
    <div class="section-title">Add New User</div>
    <input type="text" id="newUser" placeholder="Username">
    <input type="password" id="newPass" placeholder="Password">
    <button onclick="saveUser()">Save User</button>
    <div class="message" id="userMsg"></div>
</div>

<div class="card">
    <div class="section-title">User List</div>
    <div id="userList" class="user-list"></div>
</div>

<div class="card">
    <div class="section-title">Upload File / App</div>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>
    <div class="message" id="fileMsg"></div>
    <div class="file-list" id="fileList"></div>
</div>

<div class="card">
    <div class="section-title">Logout</div>
    <button onclick="logout()">Logout</button>
</div>

</div>

<script type="module">
import { db, storage } from './index.html';
import { doc, setDoc, getDocs, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-firestore.js";
import { ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-storage.js";

if(localStorage.getItem("admin")!=="true"){ alert("Access Denied!"); window.location="index.html"; }

async function saveUser(){
    let username = document.getElementById("newUser").value.trim();
    let password = document.getElementById("newPass").value.trim();
    let msg = document.getElementById("userMsg");
    if(!username||!password){ msg.textContent="Enter both fields"; msg.style.color="red"; return; }
    await setDoc(doc(db,"users",username),{username,password,access:false});
    msg.textContent="User added!";
    msg.style.color="green";
    document.getElementById("newUser").value="";
    document.getElementById("newPass").value="";
    loadUsers();
}

async function loadUsers(){
    const querySnapshot = await getDocs(collection(db,"users"));
    const listDiv = document.getElementById("userList");
    listDiv.innerHTML="";
    querySnapshot.forEach(docSnap=>{
        const u = docSnap.data();
        let div = document.createElement("div");
        div.className="user-item";
        div.innerHTML=`<span>${u.username} ${u.access?"(Access Granted)":"(No Access)"}</span>
                       <button onclick="toggleAccess('${u.username}')">${u.access?"Revoke":"Grant"}</button>`;
        listDiv.appendChild(div);
    });
}

async function toggleAccess(username){
    const userRef = doc(db,"users",username);
    const docSnap = await getDocs(collection(db,"users"));
    let userData;
    docSnap.forEach(d=>{ if(d.id===username) userData=d.data(); });
    await updateDoc(userRef,{access:!userData.access});
    loadUsers();
}

async function uploadFile(){
    let input = document.getElementById("fileInput");
    let msg = document.getElementById("fileMsg");
    if(!input.files[0]){ msg.textContent="Select a file"; msg.style.color="red"; return; }
    const file = input.files[0];
    const storageRef = ref(storage,'uploads/'+file.name);
    await uploadBytes(storageRef,file);
    msg.textContent="File uploaded!";
    msg.style.color="green";
    input.value="";
    loadFiles();
}

async function loadFiles(){
    const listDiv = document.getElementById("fileList");
    listDiv.innerHTML="";
    const listRef = ref(storage,'uploads/');
    const res = await listAll(listRef);
    res.items.forEach(async item=>{
        const url = await getDownloadURL(item);
        let div = document.createElement("div");
        div.className="file-item";
        div.innerHTML=`<a href="${url}" target="_blank">${item.name}</a>`;
        listDiv.appendChild(div);
    });
}

function logout(){ localStorage.removeItem("admin"); window.location="index.html"; }

loadUsers();
loadFiles();
</script>

</body>
</html>
