<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asma ❤️ Ultimate Pro Max</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Courier New;}
body{background:black;color:gold;text-align:center;overflow-x:hidden;}

/* CARD */
.card{margin-top:80px;padding:20px;}
.counter{margin:10px;font-size:14px;color:gold;}

/* BUTTON */
button{padding:8px 18px;border:none;border-radius:20px;background:gold;cursor:pointer;margin:5px;}

/* ---------------- FINGERPRINT ---------------- */
.fingerprint-container{width:120px;height:120px;margin:20px auto;position:relative;}
.fingerprint{
width:120px;height:120px;border:3px solid gold;border-radius:50%;
box-shadow:0 0 20px gold;
}
.scan-line{
position:absolute;width:100%;height:4px;background:cyan;
top:0;opacity:0;
}
.scanning .scan-line{animation:scan 2s linear infinite;opacity:1;}
@keyframes scan{0%{top:0;}100%{top:110px;}}

/* SUCCESS / ERROR */
.success-glow .fingerprint{border-color:lime;box-shadow:0 0 25px lime;}
.error-glow .fingerprint{border-color:red;box-shadow:0 0 25px red;}
@keyframes vibrate{0%{transform:translateX(0);}25%{transform:translateX(-5px);}50%{transform:translateX(5px);}75%{transform:translateX(-5px);}100%{transform:translateX(0);}}
.vibrate{animation:vibrate 0.3s;}

/* RING */
@keyframes ringPop{0%{transform:scale(0);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
.ring{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:90px;animation:ringPop 1s;z-index:99999;}

/* ROSE */
.rose{position:fixed;font-size:22px;top:-20px;z-index:9999;transition:4s linear;}

/* SHAKE */
@keyframes shake{0%{transform:translate(0);}25%{transform:translate(5px);}50%{transform:translate(-5px);}75%{transform:translate(5px);}100%{transform:translate(0);}}
.shake{animation:shake 0.4s infinite;}

/* MOBILE */
@media(max-width:600px){
.card{width:95%;}
.counter{font-size:12px;}
button{padding:6px 12px;font-size:12px;}
.ring{font-size:60px;}
}

/* GIFT */
#giftPopup{
display:none;position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:black;padding:25px;border-radius:20px;
box-shadow:0 0 25px gold;z-index:999999;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">

<h2>🔐 Fingerprint Secure Love</h2>

<div class="fingerprint-container">
<div class="fingerprint"></div>
<div class="scan-line"></div>
</div>

<input type="password" id="passwordInput" placeholder="Enter Password">
<br>
<button onclick="checkPassword()">Unlock ❤️</button>
<p id="errorMsg" style="color:red;"></p>

</div>

<!-- MAIN -->
<div id="mainContent" style="display:none;">
<div class="card">

<h1>💖 Asma 💖</h1>

<div class="counter" id="loveCounter"></div>
<div class="counter" id="valentineCounter"></div>
<div class="counter" id="birthdayCounter"></div>

<button onclick="startCelebration()">💍 Yes</button>
<button onclick="playVoice()">🎤 Voice</button>

</div>
</div>

<!-- GIFT -->
<div id="giftPopup">
<h2>🎁 Surprise Gift 🎁</h2>
<p style="color:white;">You are my everything 💖</p>
</div>

<!-- AUDIO -->
<audio id="scanSound"><source src="scan.mp3"></audio>
<audio id="bgMusic" loop><source src="romantic.mp3"></audio>
<audio id="birthdayMusic" loop><source src="birthday.mp3"></audio>
<audio id="voiceMessage"><source src="voice.mp3"></audio>

<script>

const password="RA";

/* PASSWORD + FINGERPRINT */
function checkPassword(){
const input=document.getElementById("passwordInput");
const container=document.querySelector(".fingerprint-container");
const error=document.getElementById("errorMsg");

if(input.value===password){

container.classList.add("scanning");
document.getElementById("scanSound").play();

setTimeout(()=>{
container.classList.add("success-glow");
},1200);

setTimeout(()=>{
document.getElementById("lockScreen").style.display="none";
document.getElementById("mainContent").style.display="block";
document.getElementById("bgMusic").play();
},2200);

}else{

container.classList.add("error-glow","vibrate");
error.innerText="Access Denied 🚫";

setTimeout(()=>{
container.classList.remove("error-glow","vibrate");
},1000);
}
}

/* TOUCH LOGIN */
document.querySelector(".fingerprint-container").addEventListener("click",checkPassword);

/* LOVE COUNTER */
setInterval(()=>{
let start=new Date("2021-02-14");
let now=new Date();
document.getElementById("loveCounter").innerText=
"Love Days: "+Math.floor((now-start)/86400000);
},1000);

/* VALENTINE */
setInterval(()=>{
let now=new Date();
let year=now.getFullYear();
if(now>new Date(`February 14, ${year}`))year++;
let diff=new Date(`February 14, ${year}`)-now;
document.getElementById("valentineCounter").innerText=
"Next Valentine: "+Math.floor(diff/86400000)+" Days";
},1000);

/* BIRTHDAY */
setInterval(()=>{
let now=new Date();
let year=now.getFullYear();
if(now>new Date(`August 17, ${year}`))year++;
let diff=new Date(`August 17, ${year}`)-now;
document.getElementById("birthdayCounter").innerText=
"Asma Birthday: "+Math.floor(diff/86400000)+" Days";
},1000);

/* RING */
function startCelebration(){
const ring=document.createElement("div");
ring.className="ring";
ring.innerHTML="💍";
document.body.appendChild(ring);
setTimeout(()=>ring.remove(),2000);

/* ROSE RAIN */
setInterval(()=>{
const rose=document.createElement("div");
rose.className="rose";
rose.innerHTML="🌹";
rose.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(rose);

setTimeout(()=>{
rose.style.top=window.innerHeight+"px";
},50);

setTimeout(()=>rose.remove(),4000);

},250);

/* GIFT */
setTimeout(()=>{
document.getElementById("giftPopup").style.display="block";
},7000);
}

/* VOICE */
function playVoice(){
document.getElementById("voiceMessage").play();
}

/* BIRTHDAY MODE */
function checkBirthday(){
let now=new Date();
if(now.getDate()===17 && now.getMonth()===7){
document.getElementById("birthdayMusic").play();
document.body.classList.add("shake");
alert("🎉 Happy Birthday Asma 🎉");
}
}
checkBirthday();

</script>

</body>
</html>
