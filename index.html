<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; margin:0; }
.card { background:#fff; padding:40px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:100%; max-width:400px; text-align:center; }
input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ccc; outline:none; font-size:16px; }
input:focus { border-color:#007bff; box-shadow:0 0 5px rgba(0,123,255,0.3); }
button { width:100%; padding:12px; margin-top:20px; border:none; border-radius:8px; background:#007bff; color:white; font-size:16px; cursor:pointer; }
button:hover { background:#0056b3; }
.message { margin-top:15px; color:red; font-weight:bold; }
</style>
</head>
<body>

<div class="card">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="message" id="message"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKOzg-bivUIWgug9M_-Gb_48huqfsth08",
  authDomain: "rashid-app-28ee9.firebaseapp.com",
  projectId: "rashid-app-28ee9",
  storageBucket: "rashid-app-28ee9.appspot.com",
  messagingSenderId: "839037586224",
  appId: "1:839037586224:web:fba3d0368621ad9fb156f5",
  measurementId: "G-8MP3RC225Y"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db; // Global

async function login(){
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();
    let msg = document.getElementById("message");

    // Admin login
    if(user==="rashid" && pass==="1122"){
        localStorage.setItem("admin","true");
        window.location="dashboard.html";
        return;
    }

    // Normal user login
    const userDoc = await getDoc(doc(db,"users",user));
    if(!userDoc.exists()){
        msg.textContent="Username not found!";
        return;
    }
    const data = userDoc.data();
    if(data.password !== pass){
        msg.textContent="Password incorrect!";
        return;
    }
    if(!data.access){
        msg.textContent="Access not granted by Admin!";
        return;
    }

    localStorage.setItem("user", user);
    window.location="user_dashboard.html";
}
</script>

</body>
</html>
