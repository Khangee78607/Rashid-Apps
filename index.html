<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asma ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
overflow:hidden;
color:#ffd700;
text-align:center;
}

/* Stars */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* Card */
.card{
z-index:2;
background:rgba(0,0,0,0.75);
padding:30px;
border-radius:20px;
box-shadow:0 0 25px gold;
width:90%;
max-width:400px;
}

h1{
font-size:22px;
margin-bottom:15px;
animation:heartbeat 1.2s infinite;
}

@keyframes heartbeat{
0%{transform:scale(1);}
25%{transform:scale(1.1);}
50%{transform:scale(1);}
75%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.counter{
font-size:18px;
line-height:1.6;
text-shadow:0 0 10px gold,0 0 20px orange;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px gold;}
to{text-shadow:0 0 20px orange;}
}

button{
padding:8px 20px;
margin-top:15px;
border:none;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

#yes{background:gold;color:black;}
#no{background:white;color:black;position:absolute;}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:1;
}

.photo{
width:160px;
height:160px;
border-radius:50%;
border:4px solid gold;
box-shadow:0 0 20px gold;
margin-top:20px;
}
</style>
</head>

<body>

<div class="card">
<h1>💖 Asma 💖</h1>

<div class="counter" id="loveCounter"></div>

<p style="margin-top:10px;color:white;">
14 February 2021 Se Sirf Ap Mery Sat Happy Hu Or Any Waly Kafi Zada 14 February Sat Guzarna Chanty Hu ❤️
</p>

<button id="yes" onclick="startCelebration()">Yes 💍</button>
<button id="no" onmouseover="moveNo()">No 😜</button>
</div>

<canvas id="canvas"></canvas>

<script>

/* Generate Stars */
for(let i=0;i<150;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
star.style.animationDuration=(Math.random()*3+1)+"s";
document.body.appendChild(star);
}

/* Live Love Counter */
const startDate=new Date("February 14, 2021 00:00:00");

function updateLoveTime(){
const now=new Date();

let years=now.getFullYear()-startDate.getFullYear();
let months=now.getMonth()-startDate.getMonth();
let days=now.getDate()-startDate.getDate();

if(days<0){
months--;
days+=new Date(now.getFullYear(),now.getMonth(),0).getDate();
}

if(months<0){
years--;
months+=12;
}

const diff=now-startDate;
const hours=Math.floor((diff/(1000*60*60))%24);
const minutes=Math.floor((diff/(1000*60))%60);
const seconds=Math.floor((diff/1000)%60);

document.getElementById("loveCounter").innerHTML=
`${years}Y : ${months}M : ${days}D <br>
${hours}H : ${minutes}M : ${seconds}S`;
}

setInterval(updateLoveTime,1000);
updateLoveTime();

/* No Button Move */
function moveNo(){
let btn=document.getElementById("no");
btn.style.left=Math.random()*300+"px";
btn.style.top=Math.random()*300+"px";
}

/* Fireworks */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];

function createFirework(){
for(let i=0;i<100;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
angle:Math.random()*2*Math.PI,
speed:Math.random()*6+2
});
}
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.speed*=0.95;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,2*Math.PI);
ctx.fillStyle="gold";
ctx.fill();

if(p.speed<0.5)particles.splice(i,1);
});

requestAnimationFrame(animate);
}
animate();

/* YES Celebration */
function startCelebration(){
document.querySelector(".card").innerHTML=`
<h1 style="color:gold;">💍 She Said YES 💍</h1>

<img src="./asma.jpg" class="photo">

<p style="margin-top:20px;color:white;font-size:18px;text-shadow:0 0 10px gold;">
💖 Asma & Rashid 💖 <br>
Aap dono hamesha isi tarah saath raho ✨🌹
</p>
`;

setInterval(createFirework,800);
}

</script>

</body>
</html>
