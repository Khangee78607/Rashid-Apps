<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Asma ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
color:white;
text-align:center;
}

/* Glass Card */
.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
width:90%;
max-width:400px;
box-shadow:0 0 30px rgba(0,0,0,0.2);
position:relative;
z-index:2;
}

h1{font-size:24px;margin-bottom:15px;}
p{font-size:16px;margin-bottom:20px;}

/* Buttons */
button{
padding:10px 25px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
margin:5px;
transition:0.3s;
}

#yes{background:white;color:#ff4e8a;}
#no{background:black;color:white;position:absolute;}

button:hover{transform:scale(1.1);}

/* Ring Box */
.ring-box{
width:120px;
height:80px;
background:#b8860b;
margin:20px auto;
border-radius:10px;
position:relative;
cursor:pointer;
transition:0.5s;
}

.lid{
width:120px;
height:40px;
background:#d4af37;
position:absolute;
top:0;
left:0;
border-radius:10px 10px 0 0;
transform-origin:top;
transition:0.7s;
}

.ring{
position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
font-size:30px;
opacity:0;
transition:0.7s;
}

.open .lid{
transform:rotateX(150deg);
}

.open .ring{
opacity:1;
}

/* Roses */
.rose{
position:absolute;
top:-50px;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* Canvas */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:1;
}
</style>
</head>

<body>

<div class="card">
<h1>Asma ❤️</h1>
<p>Tum meri zindagi ki sabse khoobsurat dua ho.  
Kya tum meri hamesha ke liye banogi? 💍</p>

<div class="ring-box" onclick="openRing()" id="ringBox">
<div class="lid"></div>
<div class="ring">💍</div>
</div>

<button id="yes" onclick="startCelebration()">Yes 💖</button>
<button id="no" onmouseover="moveNo()">No 😜</button>
</div>

<canvas id="canvas"></canvas>

<script>
// No button run
function moveNo(){
let btn=document.getElementById("no");
btn.style.left=Math.random()*200+"px";
btn.style.top=Math.random()*200+"px";
}

// Ring open
function openRing(){
document.getElementById("ringBox").classList.toggle("open");
}

// Roses falling
setInterval(()=>{
let rose=document.createElement("div");
rose.className="rose";
rose.innerHTML="🌹";
rose.style.left=Math.random()*100+"vw";
rose.style.fontSize=(Math.random()*20+15)+"px";
document.body.appendChild(rose);
setTimeout(()=>rose.remove(),6000);
},400);

// Fireworks
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];

function createFirework(){
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height/2,
angle:Math.random()*2*Math.PI,
speed:Math.random()*5+2
});
}
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.1)";
ctx.fillRect(0,0,canvas.width,canvas.height);
particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.speed*=0.96;
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,2*Math.PI);
ctx.fillStyle="hsl("+Math.random()*360+",100%,60%)";
ctx.fill();
if(p.speed<0.5)particles.splice(i,1);
});
requestAnimationFrame(animate);
}
animate();

function startCelebration(){
document.querySelector(".card").innerHTML="<h1>Yayyyy ❤️ Asma said YES! 💍🎆</h1>";
setInterval(createFirework,700);
}
</script>

</body>
</html>
