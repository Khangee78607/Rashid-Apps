<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>
<style>
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif'; margin:0; background:#f0f2f5; }
header { background:#28a745; color:white; padding:20px; text-align:center; font-size:24px; font-weight:bold; }
.container { padding:30px; display:flex; flex-direction:column; align-items:center; gap:20px; }
.card { background:white; padding:20px; border-radius:12px; width:300px; box-shadow:0 8px 20px rgba(0,0,0,0.1); text-align:center; }
button { padding:10px 20px; margin-top:15px; border:none; border-radius:8px; background:#28a745; color:white; cursor:pointer; font-size:16px; }
button:hover { background:#1e7e34; }
.file-list { margin-top:10px; text-align:left; max-height:200px; overflow-y:auto; width:100%; }
.file-item { padding:5px 10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; }
</style>
</head>
<body>

<header>User Dashboard</header>

<div class="container">
<div class="card">
    <h3>Available Files / Apps</h3>
    <div id="fileList" class="file-list"></div>
</div>
<div class="card">
    <button onclick="logout()">Logout</button>
</div>
</div>

<script type="module">
import { storage } from './index.html';
import { ref, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-storage.js";

let currentUser = localStorage.getItem("user");
if(!currentUser){ alert("Access Denied!"); window.location="index.html"; }

async function loadFiles(){
    const listDiv = document.getElementById("fileList");
    listDiv.innerHTML="";
    const listRef = ref(storage,'uploads/');
    const res = await listAll(listRef);
    res.items.forEach(async item=>{
        const url = await getDownloadURL(item);
        let div = document.createElement("div");
        div.className="file-item";
        div.innerHTML=`<a href="${url}" target="_blank">${item.name}</a>`;
        listDiv.appendChild(div);
    });
}

function logout(){ localStorage.removeItem("user"); window.location="index.html"; }

loadFiles();
</script>

</body>
</html>
